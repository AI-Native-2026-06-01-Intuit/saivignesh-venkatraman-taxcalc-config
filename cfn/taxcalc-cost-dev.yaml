  #       - {Key: Project, Value: taxcalc}
  #       - {Key: trainee, Value: saivignesh-venkatraman}
  #       - {Key: team, Value: capstone-team-5}
  #       - {Key: environment, Value: training}

Outputs:
  # ---------------------------------------------------------------------------
  # LEGACY BEDROCK PATH -- COMMENTED OUT PER EM OVERRIDE
  # ---------------------------------------------------------------------------
  # BedrockInvokeRoleArn:
  #   Description: IRSA role ARN for taxcalc-svc (eks.amazonaws.com/role-arn annotation).
  #   Value: !GetAtt BedrockInvokeRole.Arn
  #   Export: {Name: !Sub "${AWS::StackName}-BedrockInvokeRoleArn"}

  LlmProviderApiKeySecretArn:
    Description: ARN of the Secrets Manager placeholder for the direct LLM provider API key.
    Value: !Ref LlmProviderApiKeySecret
    Export: {Name: !Sub "${AWS::StackName}-LlmProviderApiKeySecretArn"}
  LlmProviderApiKeySecretName:
    Description: Name of the Secrets Manager placeholder (real key set out-of-band).
    Value: !Sub "taxcalc/${EnvName}/llm-provider-api-key"
    Export: {Name: !Sub "${AWS::StackName}-LlmProviderApiKeySecretName"}
  CostAlarmsTopicArn:
    Description: SNS topic ARN for budget/cost alarm subscribers (channels in other stacks).
    Value: !Ref CostAlarmsTopic
    Export: {Name: !Sub "${AWS::StackName}-CostAlarmsTopicArn"}
  MonthlyBudgetName:
    Description: AWS Budgets name for the monthly COST limit.
    Value: !Sub "taxcalc-monthly-cost-${EnvName}-sai"
    Export: {Name: !Sub "${AWS::StackName}-MonthlyBudgetName"}
  CurBucketName:
    Description: S3 bucket name for Cost and Usage Report delivery.
    Value: !Ref CurDestinationBucket
    Export: {Name: !Sub "${AWS::StackName}-CurBucketName"}
