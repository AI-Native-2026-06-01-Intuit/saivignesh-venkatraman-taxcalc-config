  #     AssumeRolePolicyDocument:
  #       Version: "2012-10-17"
  #       Statement:
  #         - Effect: Allow
  #           Principal:
  #             Service: budgets.amazonaws.com
  #           Action: sts:AssumeRole
  #     Policies:
  #       - PolicyName: attach-detach-bedrock-deny-only
  #         PolicyDocument:
  #           Version: "2012-10-17"
  #           Statement:
  #             - Sid: AttachDetachBedrockDenyOnly
  #               Effect: Allow
  #               Action:
  #                 - iam:AttachRolePolicy
  #                 - iam:DetachRolePolicy
  #               Resource: !GetAtt BedrockInvokeRole.Arn
  #               Condition:
  #                 ArnEquals:
  #                   "iam:PolicyARN": !Ref TaxcalcBedrockDenyPolicy
  #     Tags:
  #       - {Key: Env, Value: !Ref EnvName}
