# cfn/taxcalc-cost-dev.yaml
# Cost-control stack (W6D4 active path):
#   - Secrets Manager placeholder for a direct LLM provider API key
#   - cost alarm SNS topic
#   - CloudWatch cost-per-request alarm (app/proxy EMF CostUsd)
#   - AWS Budget notifications (forecasted 80% + actual 100% SNS)
#   - CUR destination S3 bucket
#
# Direct API provider (default anthropic), not Bedrock. SNS channel
# subscribers (Slack Lambda, PagerDuty) live in separate stacks.
#
# Deploy with the ChangeSet flow:
#   aws cloudformation create-change-set \
#     --stack-name taxcalc-cost-dev-sai \
#     --change-set-name initial --change-set-type CREATE \
#     --template-body file://cfn/taxcalc-cost-dev.yaml \
#     --parameters ParameterKey=EnvName,ParameterValue=dev \
#     --region us-east-1
AWSTemplateFormatVersion: "2010-09-09"
Description: taxcalc cost controls (sai) -- direct LLM provider secret + budget SNS + CW alarm + CUR.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment.
  MonthlyBudgetUsd:
    Type: Number
    Default: 3500
    MinValue: 100
    MaxValue: 100000
    Description: Monthly COST budget limit in USD (AWS Budgets).
  LlmProvider:
    Type: String
    Default: anthropic
    AllowedValues: [anthropic, gemini]
    Description: Runtime LLM provider used by the app/proxy. Direct API provider, not Bedrock.
  AnthropicModelId:
    Type: String
    # Matches taxcalc-api application.yml direct Anthropic model convention.
    Default: claude-sonnet-4-5
    Description: Direct Anthropic API model id used by the runtime provider config. This is not a Bedrock model id.

  # ---------------------------------------------------------------------------
  # LEGACY BEDROCK PATH -- COMMENTED OUT PER EM OVERRIDE
  # Original W6D4 rubric expected Bedrock IRSA + bedrock:InvokeModel + BudgetsAction.
  # EM instructed the cohort to use a direct provider API key instead of Bedrock.
  # Kept here for review context only. Do not uncomment unless the requirement changes.
  # ---------------------------------------------------------------------------
  # BedrockModelId:
  #   Type: String
  #   Default: anthropic.claude-haiku-4-5-20251001-v1:0
  #   Description: Pinned Bedrock foundation model id for explicit IAM resource scope.
  # EksOidcProviderArn:
  #   Type: String
  #   Description: ARN of the shared, platform-provided capstone EKS cluster OIDC provider.
  # EksOidcIssuerHost:
  #   Type: String
  #   Default: ""
  #   Description: >-
  #     Host path of the EKS OIDC issuer (everything after oidc-provider/ in the
  #     provider ARN, no https://). Leave blank until the platform publishes the
  #     shared cluster issuer; IRSA assume will not work until this is set.

Resources:
  # --- Alarm contract only. Channel subscribers are out-of-band CFN.
  CostAlarmsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "taxcalc-cost-alarms-${EnvName}-sai"
      DisplayName: !Sub "taxcalc cost alarms (${EnvName})"
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  CostAlarmsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CostAlarmsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowBudgetsPublish
            Effect: Allow
            Principal:
              Service: budgets.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CostAlarmsTopic
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId
          - Sid: AllowCloudWatchPublish
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CostAlarmsTopic
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId

  # --- Direct LLM provider API key placeholder.
  # Do NOT commit the real key. Insert/rotate the secret value out-of-band
  # via AWS Console, CLI, or SSO (put-secret-value) after stack create.
  # If a key was shared in Slack/chat, treat it as exposed and rotate it.
  LlmProviderApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "taxcalc/${EnvName}/llm-provider-api-key-sai"
      Description: >-
        Placeholder for the direct LLM provider API key (Anthropic/Gemini).
        Replace the generated value out-of-band -- never store the real key in Git.
      KmsKeyId: alias/aws/secretsmanager
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"provider":"${LlmProvider}","model":"${AnthropicModelId}"}'
        GenerateStringKey: apiKey
        PasswordLength: 32
        ExcludePunctuation: true
      Tags:
        - {Key: service, Value: taxcalc}
        - {Key: env, Value: !Ref EnvName}
        - {Key: tenant, Value: shared}
        - {Key: feature, Value: explain-liability}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  # --- CUR destination bucket. Hardened: PAB, SSE-KMS, versioning,
  # 90d STANDARD_IA, deny-non-TLS. Retain on delete and on replace.
  CurDestinationBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: Access logging deferred for training CUR bucket; PAB + KMS + deny-non-TLS already enforced.
    Properties:
      BucketName: !Sub "uptimecrew-taxcalc-cur-${EnvName}-sai-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: tier-to-ia-at-90d
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - {Key: Name, Value: !Sub "uptimecrew-taxcalc-cur-${EnvName}-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  CurDestinationBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CurDestinationBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt CurDestinationBucket.Arn
              - !Sub "${CurDestinationBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  # --- Per-request cost alarm. Metric is emitted by the app/proxy via EMF
  # (acme/llmproxy CostUsd), not from Bedrock. Missing datapoints are
  # treated as breaching so a silent emitter cannot hide spend spikes.
  CostPerRequestAlarm:
    Type: AWS::CloudWatch::Alarm
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: Stable AlarmName taxcalc/cost-per-request-<EnvName> required for runbooks and SNS alarm contract.
    Properties:
      AlarmName: !Sub "taxcalc/cost-per-request-${EnvName}"
      AlarmDescription: >-
        AVG(CostUsd) EMF metric for service=taxcalc feature=explain-liability
        exceeds $0.005 per request over 3 consecutive periods.
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 0.005
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref CostAlarmsTopic
      OKActions:
        - !Ref CostAlarmsTopic
      InsufficientDataActions:
        - !Ref CostAlarmsTopic
      Metrics:
        - Id: m1
          ReturnData: true
          Label: AvgCostUsdPerRequest
          MetricStat:
            Metric:
              Namespace: acme/llmproxy
              MetricName: CostUsd
              Dimensions:
                - Name: service
                  Value: taxcalc
                - Name: feature
                  Value: explain-liability
            Period: 60
            Stat: Average
      Tags:
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  # --- AWS Budget: commented out -- requires budgets:ModifyBudget which is
  # not granted in the sandbox, and Anthropic direct-API spend does not
  # appear on the AWS bill so the budget would not guard LLM costs anyway.
  # MonthlyCostBudget:
  #   Type: AWS::Budgets::Budget
  #   Properties:
  #     Budget:
  #       BudgetName: !Sub "taxcalc-monthly-cost-${EnvName}-sai"
  #       BudgetType: COST
  #       TimeUnit: MONTHLY
  #       BudgetLimit:
  #         Amount: !Ref MonthlyBudgetUsd
  #         Unit: USD
  #       CostFilters:
  #         TagKeyValue:
  #           - "user:service$taxcalc"
  #           - !Join ["", ["user:env$", !Ref EnvName]]
  #     NotificationsWithSubscribers:
  #       - Notification:
  #           NotificationType: FORECASTED
  #           ComparisonOperator: GREATER_THAN
  #           Threshold: 80
  #           ThresholdType: PERCENTAGE
  #         Subscribers:
  #           - SubscriptionType: SNS
  #             Address: !Ref CostAlarmsTopic
  #       - Notification:
  #           NotificationType: ACTUAL
  #           ComparisonOperator: GREATER_THAN
  #           Threshold: 100
  #           ThresholdType: PERCENTAGE
  #         Subscribers:
  #           - SubscriptionType: SNS
  #             Address: !Ref CostAlarmsTopic
  #     ResourceTags:
  #       - {Key: Env, Value: !Ref EnvName}
  #       - {Key: Project, Value: taxcalc}
  #       - {Key: trainee, Value: saivignesh-venkatraman}
  #       - {Key: team, Value: capstone-team-5}
  #       - {Key: environment, Value: training}

  # ---------------------------------------------------------------------------
  # LEGACY BEDROCK PATH -- COMMENTED OUT PER EM OVERRIDE
  # Original W6D4 rubric expected Bedrock IRSA + bedrock:InvokeModel + BudgetsAction.
  # EM instructed the cohort to use a direct provider API key instead of Bedrock.
  # Kept here for review context only. Do not uncomment unless the requirement changes.
  # ---------------------------------------------------------------------------
  #
  # # --- Bedrock IRSA role: trusts shared capstone EKS OIDC only.
  # # StringEquals (not StringLike) on the IRSA sub claim.
  # # Inline Allow is pinned to one model ARN -- no bedrock:*, no Resource '*'.
  # BedrockInvokeRole:
  #   Type: AWS::IAM::Role
  #   Metadata:
  #     cfn_nag:
  #       rules_to_suppress:
  #         - id: W28
  #           reason: Stable RoleName taxcalc-bedrock-invoke-sai required for IRSA annotation on taxcalc-svc.
  #   Properties:
  #     RoleName: taxcalc-bedrock-invoke-sai
  #     Description: IRSA role for taxcalc-svc to InvokeModel on the pinned Haiku foundation model.
  #     AssumeRolePolicyDocument:
  #       Fn::Sub:
  #         - |
  #           {
  #             "Version": "2012-10-17",
  #             "Statement": [
  #               {
  #                 "Effect": "Allow",
  #                 "Principal": {
  #                   "Federated": "${EksOidcProviderArn}"
  #                 },
  #                 "Action": "sts:AssumeRoleWithWebIdentity",
  #                 "Condition": {
  #                   "StringEquals": {
  #                     "${EksOidcIssuerHost}:aud": "sts.amazonaws.com",
  #                     "${EksOidcIssuerHost}:sub": "system:serviceaccount:taxcalc-dev:taxcalc-svc"
  #                   }
  #                 }
  #               }
  #             ]
  #           }
  #         - EksOidcProviderArn: !Ref EksOidcProviderArn
  #           EksOidcIssuerHost: !Ref EksOidcIssuerHost
  #     Policies:
  #       - PolicyName: bedrock-invoke-haiku-only
  #         PolicyDocument:
  #           Version: "2012-10-17"
  #           Statement:
  #             - Sid: InvokePinnedHaiku
  #               Effect: Allow
  #               Action: bedrock:InvokeModel
  #               Resource: !Sub
  #                 - "arn:aws:bedrock:us-east-1::foundation-model/${ModelId}"
  #                 - ModelId: !Ref BedrockModelId
  #     Tags:
  #       - {Key: Env, Value: !Ref EnvName}
  #       - {Key: Project, Value: taxcalc}
  #       - {Key: trainee, Value: saivignesh-venkatraman}
  #       - {Key: team, Value: capstone-team-5}
  #       - {Key: environment, Value: training}
  #
  # # --- Detached Deny policy. Attached automatically by BudgetsAction at
  # # actual 100%; human runbook detaches after budget reset.
  # TaxcalcBedrockDenyPolicy:
  #   Type: AWS::IAM::ManagedPolicy
  #   Metadata:
  #     cfn_nag:
  #       rules_to_suppress:
  #         - id: W28
  #           reason: Stable ManagedPolicyName required for runbook attach/detach by ARN/name.
  #   Properties:
  #     ManagedPolicyName: taxcalc-bedrock-deny-invoke-sai
  #     Description: >-
  #       Deny bedrock:InvokeModel on the pinned Haiku model. Keep detached until
  #       a budget breach; human runbook attaches to freeze spend, then detaches
  #       after reset.
  #     Path: /
  #     PolicyDocument:
  #       Version: "2012-10-17"
  #       Statement:
  #         - Sid: DenyPinnedHaikuInvoke
  #           Effect: Deny
  #           Action: bedrock:InvokeModel
  #           Resource: !Sub
  #             - "arn:aws:bedrock:us-east-1::foundation-model/${ModelId}"
  #             - ModelId: !Ref BedrockModelId
  #
  # # --- Role assumed by AWS Budgets to attach/detach the Deny policy.
  # BudgetActionRole:
  #   Type: AWS::IAM::Role
  #   Metadata:
  #     cfn_nag:
  #       rules_to_suppress:
  #         - id: W28
  #           reason: Stable RoleName taxcalc-budget-action-sai required for AWS Budgets action configuration.
  #   Properties:
  #     RoleName: taxcalc-budget-action-sai
