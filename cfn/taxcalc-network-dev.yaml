# cfn/taxcalc-network-dev.yaml
# TASK 2 network stack: 3-AZ VPC, IGW, public + private subnets
# (one of each per AZ), per-env NAT GW count gated by Conditions
# (single NAT in dev; per-AZ NAT in staging/prod), and one
# application security group. Outputs are EXPORTED for the
# application stack (Task 3) to consume via !ImportValue.
#
# Deploy with the ChangeSet flow:
  # aws cloudformation create-change-set \
  #   --stack-name taxcalc-network-dev-sai \
  #   --change-set-name initial --change-set-type CREATE \
  #   --template-body file://cfn/taxcalc-network-dev.yaml \
  #   --parameters ParameterKey=EnvName,ParameterValue=dev \
  #   --region us-east-1
AWSTemplateFormatVersion: "2010-09-09"
Description: taxcalc 3-AZ VPC + app SG (sai) -- parameterised by env.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment; gates NAT-GW count.
  VpcCidr:
    Type: String
    Default: 10.41.0.0/16
    Description: VPC CIDR. Must not overlap any peered network.
    AllowedPattern: "^10\\.\\d{1,3}\\.0\\.0/16$"

Mappings:
  # Per-env scale hints, consumed by the application stack via
  # !FindInMap when it imports the network's VpcCidr.
  EnvToReplicas:
    dev: {AppMin: "1", AppDesired: "1", AppMax: "2"}
    staging: {AppMin: "2", AppDesired: "2", AppMax: "4"}
    prod: {AppMin: "3", AppDesired: "3", AppMax: "6"}

Conditions:
  # IsDev: single NAT GW (cost). IsProdLike: NAT-per-AZ (HA).
  IsDev: !Equals [!Ref EnvName, dev]
  IsProdLike: !Or
    - !Equals [!Ref EnvName, staging]
    - !Equals [!Ref EnvName, prod]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-vpc-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-igw-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  IgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # --- Public subnets (3): IGW-routed, host the NAT GW(s).
  # CIDRs from !Cidr [VpcCidr, 8, 8] — first three /24s.
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 8, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-public-a-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 8, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-public-b-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !GetAZs ""]
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 8, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-public-c-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  # --- Private subnets (3): NAT-routed, host workloads (CIDRs 3–5).
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 8, 8]]
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-private-a-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [4, !Cidr [!Ref VpcCidr, 8, 8]]
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-private-b-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !GetAZs ""]
      CidrBlock: !Select [5, !Cidr [!Ref VpcCidr, 8, 8]]
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-private-c-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  # --- NAT Gateway: always at least one (A); B and C only when IsProdLike.
  NatEipA:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttachment
    Properties:
      Domain: vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-nat-eip-a-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEipA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-nat-a-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  NatEipBPerAz:
    Type: AWS::EC2::EIP
    Condition: IsProdLike
    DependsOn: IgwAttachment
    Properties:
      Domain: vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-nat-eip-b-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  NatGatewayBPerAz:
    Type: AWS::EC2::NatGateway
    Condition: IsProdLike
    Properties:
      AllocationId: !GetAtt NatEipBPerAz.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-nat-b-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  NatEipCPerAz:
    Type: AWS::EC2::EIP
    Condition: IsProdLike
    DependsOn: IgwAttachment
    Properties:
      Domain: vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-nat-eip-c-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  NatGatewayCPerAz:
    Type: AWS::EC2::NatGateway
    Condition: IsProdLike
    Properties:
      AllocationId: !GetAtt NatEipCPerAz.AllocationId
      SubnetId: !Ref PublicSubnetC
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-nat-c-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

  # --- Public route table: 0.0.0.0/0 -> IGW. Shared across all 3 AZs.
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-public-rt-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable
  PublicAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable
  PublicAssocC:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref PublicRouteTable

  # --- Private route tables: one per AZ when IsProdLike (each NAT);
  # shared table via NAT A when IsDev.
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-private-rt-a-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA
  PrivateAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Condition: IsProdLike
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-private-rt-b-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Condition: IsProdLike
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayBPerAz
  PrivateAssocBHA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProdLike
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB
  PrivateAssocBDev:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsDev
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableA

  PrivateRouteTableC:
    Type: AWS::EC2::RouteTable
    Condition: IsProdLike
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-private-rt-c-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}
  PrivateDefaultRouteC:
    Type: AWS::EC2::Route
    Condition: IsProdLike
    Properties:
      RouteTableId: !Ref PrivateRouteTableC
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayCPerAz
  PrivateAssocCHA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProdLike
    Properties:
      SubnetId: !Ref PrivateSubnetC
      RouteTableId: !Ref PrivateRouteTableC
  PrivateAssocCDev:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsDev
    Properties:
      SubnetId: !Ref PrivateSubnetC
      RouteTableId: !Ref PrivateRouteTableA

  # --- Application security group: 8080 from VPC CIDR only (no 0.0.0.0/0
  # ingress). Egress 443 to the internet. Egress 5432 to the RDS SG is
  # added by Task 3 (cross-stack), once that stack exports the RDS SG id.
  TaxcalcAppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "taxcalc-${EnvName}-app-sg-sai"
      GroupDescription: App SG; ingress 8080 from VPC only; egress 443; RDS 5432 via Task 3.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Ref VpcCidr
          Description: App port, in-VPC only.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS egress (ECR, STS, Secrets Manager).
      Tags:
        - {Key: Name, Value: !Sub "taxcalc-${EnvName}-app-sg-sai"}
        - {Key: Env, Value: !Ref EnvName}
        - {Key: Project, Value: taxcalc}
        - {Key: trainee, Value: saivignesh-venkatraman}
        - {Key: team, Value: capstone-team-5}
        - {Key: environment, Value: training}

Outputs:
  # Deploy as stack taxcalc-network-dev-sai so exports resolve to
  # taxcalc-network-dev-sai-VpcId / PublicSubnets / PrivateSubnets / AppSgId.
  VpcId:
    Value: !Ref Vpc
    Export: {Name: !Sub "${AWS::StackName}-VpcId"}
  VpcCidr:
    Value: !Ref VpcCidr
    Export: {Name: !Sub "${AWS::StackName}-VpcCidr"}
  PublicSubnets:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]]
    Export: {Name: !Sub "${AWS::StackName}-PublicSubnets"}
  PrivateSubnets:
    # Comma-joined; consumers split with !Split.
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]]
    Export: {Name: !Sub "${AWS::StackName}-PrivateSubnets"}
  AppSecurityGroupId:
    Value: !Ref TaxcalcAppSecurityGroup
    Export: {Name: !Sub "${AWS::StackName}-AppSgId"}
