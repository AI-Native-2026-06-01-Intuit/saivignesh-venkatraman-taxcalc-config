apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taxcalc-api
  namespace: taxcalc-dev
  labels:
    app.kubernetes.io/name: taxcalc-api
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: taxcalc-api
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
