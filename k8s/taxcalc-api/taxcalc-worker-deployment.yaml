# k8s/taxcalc-api/taxcalc-worker-deployment.yaml
#
# Scale target for ScaledObject/taxcalc-worker (KEDA aws-sqs-queue).
# Required: without this Deployment the ScaledObject stays Ready=False
# ("taxcalc-worker not found") on any cluster (k3d or EKS).
#
# Stub workload: pause container only. There is no SQS consumer image in
# the app repo yet — this Deployment exists so KEDA can own replica count
# (min 0 / max 20). Replace the container with a real calc-jobs consumer
# when that service ships; keep metadata.name=taxcalc-worker.
#
# replicas: 0 — KEDA ScaledObject owns desired count (scale-to-zero when
# the queue is empty). Do not raise this manually under the ScaledObject.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxcalc-worker
  namespace: taxcalc-dev
  labels:
    app.kubernetes.io/name:       taxcalc-worker
    app.kubernetes.io/component:  worker
    app.kubernetes.io/part-of:    taxcalc
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: taxcalc-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name:       taxcalc-worker
        app.kubernetes.io/component:  worker
        app.kubernetes.io/part-of:    taxcalc
    spec:
      # No ECR pull needed for pause; keep securityContext aligned with api.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: worker
          image: registry.k8s.io/pause:3.9
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
