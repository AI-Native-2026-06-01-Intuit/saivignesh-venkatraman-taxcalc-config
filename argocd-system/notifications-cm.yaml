apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.webhook.slack: |
    url: $slack-webhook-url
    headers:
      - name: Content-Type
        value: application/json
  trigger.on-sync-failed: |
    - when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
  template.app-sync-failed: |
    webhook:
      slack:
        method: POST
        body: |
          {"text":":x: Sync failed for {{.app.metadata.name}} ({{.app.metadata.labels.env}}).\nProject: {{.app.spec.project}}\nRevision: {{.app.status.sync.revision}}"}
  template.app-health-degraded: |
    webhook:
      slack:
        method: POST
        body: |
          {"text":":warning: Health degraded for {{.app.metadata.name}} ({{.app.metadata.labels.env}}).\nProject: {{.app.spec.project}}"}
  subscriptions: |
    - recipients:
        - slack
      selector: team=taxcalc
      triggers:
        - on-sync-failed
        - on-health-degraded
