# Dev Application for taxcalc-agent-svc rollout evidence.
# Shares overlays/dev with taxcalc-api-dev — tracking-id drift is ignored so
# both apps can coexist during the assignment without perpetual OutOfSync churn.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taxcalc-agent-svc
  namespace: argocd
  labels:
    app.kubernetes.io/name: taxcalc-agent-svc
    team: taxcalc
    env: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: taxcalc
  source:
    repoURL: https://github.com/AI-Native-2026-06-01-Intuit/saivignesh-venkatraman-taxcalc-config.git
    targetRevision: main
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: taxcalc-dev
  ignoreDifferences:
    # Shared-resource apps fight over tracking-id; ignore so health reflects workload state.
    - group: "*"
      kind: "*"
      jqPathExpressions:
        - .metadata.annotations["argocd.argoproj.io/tracking-id"]
    # HPA owns runtime replica count; git declares a baseline only.
    - group: apps
      kind: Deployment
      name: taxcalc-api
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
