name: sync-runtime-secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

jobs:
  sync-secrets:
    runs-on:
      - self-hosted
      - macOS
    steps:
      - name: Synchronize runtime Secrets
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TAXCALC_KUBECONFIG_B64: ${{ secrets.TAXCALC_KUBECONFIG_B64 }}
          TAXCALC_POSTGRES_PASSWORD: ${{ secrets.TAXCALC_POSTGRES_PASSWORD }}
          TAXCALC_GOOGLE_API_KEY: ${{ secrets.TAXCALC_GOOGLE_API_KEY }}
          TAXCALC_AGENT_ANTHROPIC_API_KEY: ${{ secrets.TAXCALC_AGENT_ANTHROPIC_API_KEY }}
          TAXCALC_AGENT_MCP_BEARER_TOKEN: ${{ secrets.TAXCALC_AGENT_MCP_BEARER_TOKEN }}
          TAXCALC_AGENT_SERVICE_AUTH_BEARER: ${{ secrets.TAXCALC_AGENT_SERVICE_AUTH_BEARER }}
          TAXCALC_AGENT_LANGSMITH_API_KEY: ${{ secrets.TAXCALC_AGENT_LANGSMITH_API_KEY }}
        run: |
          set -euo pipefail
          umask 077
          TMPDIR="$(mktemp -d)"
          cleanup() { rm -rf "$TMPDIR"; }
          trap cleanup EXIT

          case "$ENVIRONMENT" in
            dev) NAMESPACE=taxcalc-dev ;;
            staging) NAMESPACE=taxcalc-staging ;;
            prod) NAMESPACE=taxcalc-prod ;;
            *) echo "unknown environment" >&2; exit 2 ;;
          esac

          printf '%s' "$TAXCALC_KUBECONFIG_B64" | base64 --decode > "$TMPDIR/kubeconfig"
          chmod 600 "$TMPDIR/kubeconfig"
          export KUBECONFIG="$TMPDIR/kubeconfig"

          kubectl get ns "$NAMESPACE" >/dev/null

          cat > "$TMPDIR/taxcalc-api-secrets.env" <<EOF
          spring.datasource.password=${TAXCALC_POSTGRES_PASSWORD}
          GOOGLE_API_KEY=${TAXCALC_GOOGLE_API_KEY}
          EOF
          sed -i '' 's/^          //' "$TMPDIR/taxcalc-api-secrets.env" 2>/dev/null || sed -i 's/^          //' "$TMPDIR/taxcalc-api-secrets.env"
          chmod 600 "$TMPDIR/taxcalc-api-secrets.env"
          kubectl create secret generic taxcalc-api-secrets \
            --namespace="$NAMESPACE" \
            --from-env-file="$TMPDIR/taxcalc-api-secrets.env" \
            --dry-run=client -o yaml | kubectl apply -f -

          cat > "$TMPDIR/taxcalc-agent-svc-secrets.env" <<EOF
          TAXCALC_AGENT_ANTHROPIC_API_KEY=${TAXCALC_AGENT_ANTHROPIC_API_KEY}
          TAXCALC_AGENT_MCP_BEARER_TOKEN=${TAXCALC_AGENT_MCP_BEARER_TOKEN}
          TAXCALC_AGENT_SERVICE_AUTH_BEARER=${TAXCALC_AGENT_SERVICE_AUTH_BEARER}
          TAXCALC_AGENT_LANGSMITH_API_KEY=${TAXCALC_AGENT_LANGSMITH_API_KEY}
          EOF
          sed -i '' 's/^          //' "$TMPDIR/taxcalc-agent-svc-secrets.env" 2>/dev/null || sed -i 's/^          //' "$TMPDIR/taxcalc-agent-svc-secrets.env"
          chmod 600 "$TMPDIR/taxcalc-agent-svc-secrets.env"
          kubectl create secret generic taxcalc-agent-svc-secrets \
            --namespace="$NAMESPACE" \
            --from-env-file="$TMPDIR/taxcalc-agent-svc-secrets.env" \
            --dry-run=client -o yaml | kubectl apply -f -

          cat > "$TMPDIR/taxcalc-mcp-server-secrets.env" <<EOF
          TAXCALC_MCP_BEARER_JWT=${TAXCALC_AGENT_MCP_BEARER_TOKEN}
          EOF
          sed -i '' 's/^          //' "$TMPDIR/taxcalc-mcp-server-secrets.env" 2>/dev/null || sed -i 's/^          //' "$TMPDIR/taxcalc-mcp-server-secrets.env"
          chmod 600 "$TMPDIR/taxcalc-mcp-server-secrets.env"
          kubectl create secret generic taxcalc-mcp-server-secrets \
            --namespace="$NAMESPACE" \
            --from-env-file="$TMPDIR/taxcalc-mcp-server-secrets.env" \
            --dry-run=client -o yaml | kubectl apply -f -

          cat > "$TMPDIR/taxcalc-web-agent-secrets.env" <<EOF
          TAXCALC_AGENT_TOKEN=${TAXCALC_AGENT_SERVICE_AUTH_BEARER}
          EOF
          sed -i '' 's/^          //' "$TMPDIR/taxcalc-web-agent-secrets.env" 2>/dev/null || sed -i 's/^          //' "$TMPDIR/taxcalc-web-agent-secrets.env"
          chmod 600 "$TMPDIR/taxcalc-web-agent-secrets.env"
          kubectl create secret generic taxcalc-web-agent-secrets \
            --namespace="$NAMESPACE" \
            --from-env-file="$TMPDIR/taxcalc-web-agent-secrets.env" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Synchronized runtime Secrets in namespace ${NAMESPACE}"
