apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: taxcalc-dev
resources:
  - ../../base
images:
  - name: uptimecrew/taxcalc-api
    newName: 043000359802.dkr.ecr.us-east-1.amazonaws.com/uptimecrew/taxcalc-api_sai
    newTag: 37f63b8a3456abc3532086474abf53b0c55dd672-arm64
  # Sentinel tags — delivery automation must replace before enabling replicas.
  - name: uptimecrew/taxcalc-agent-svc
    newName: 043000359802.dkr.ecr.us-east-1.amazonaws.com/uptimecrew/taxcalc-agent-svc_sai
    newTag: 69edc02abf8b4c234ddf95e3d3092a0eb0f87208-arm64
  - name: uptimecrew/taxcalc-mcp-server
    newName: 043000359802.dkr.ecr.us-east-1.amazonaws.com/uptimecrew/taxcalc-mcp-server_sai
    newTag: 0.0.0-local-unpublished
  - name: uptimecrew/taxcalc-web
    newName: 043000359802.dkr.ecr.us-east-1.amazonaws.com/uptimecrew/taxcalc-web_sai
    newTag: 0.0.0-local-unpublished
replicas:
  # New workloads stay at zero until immutable image tags and runtime Secrets exist.
  - name: taxcalc-api
    count: 1
  - name: taxcalc-agent-svc
    count: 1
  - name: taxcalc-mcp-server
    count: 0
  - name: taxcalc-web
    count: 0
patches:
  - path: patch-configmap.yaml
  - path: patch-ingress.yaml
  # CPU HPA overlay removed — sole HPA is custom-metric base/50-taxcalc-api.hpa.yaml
  - path: patch-kafka.yaml
  - path: patch-agent-version-label.yaml
