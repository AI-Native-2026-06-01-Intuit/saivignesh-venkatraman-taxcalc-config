apiVersion: v1
kind: ConfigMap
metadata:
  name: taxcalc-agent-svc-config
  labels:
    app.kubernetes.io/name: taxcalc-agent-svc
data:
  TAXCALC_AGENT_ENVIRONMENT: k8s
  TAXCALC_AGENT_HOST: "0.0.0.0"
  TAXCALC_AGENT_PORT: "8080"
  TAXCALC_AGENT_POSTGRES_HOST: postgres
  TAXCALC_AGENT_POSTGRES_PORT: "5432"
  TAXCALC_AGENT_POSTGRES_DATABASE: taxcalc_dev
  TAXCALC_AGENT_POSTGRES_USERNAME: taxcalc_dev
  TAXCALC_AGENT_REDIS_HOST: redis
  TAXCALC_AGENT_REDIS_PORT: "6379"
  TAXCALC_AGENT_MCP_SSE_URL: http://taxcalc-mcp-server:8000/sse
  TAXCALC_AGENT_QUERY_REWRITE_ENABLED: "false"
  TAXCALC_AGENT_ALLOW_HEURISTIC_SYNTHESIS: "false"
  TAXCALC_AGENT_RECURSION_LIMIT: "25"
  TAXCALC_AGENT_REQUEST_COST_LIMIT_USD_E5: "25000"
  TAXCALC_AGENT_MONTHLY_COST_CEILING_USD_E5: "350000000"
  TAXCALC_AGENT_RAGAS_SAMPLE_RATE: "0.01"
  TAXCALC_AGENT_LANGSMITH_TRACING_ENABLED: "false"
