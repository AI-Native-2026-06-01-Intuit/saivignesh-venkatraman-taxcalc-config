apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxcalc-web
  labels:
    app.kubernetes.io/name: taxcalc-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: taxcalc
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: taxcalc-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taxcalc-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: taxcalc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      imagePullSecrets:
        - name: ecr-pull-sai
      containers:
        - name: taxcalc-web
          # Sentinel tag — image-bump workflow must replace before enabling replicas.
          image: uptimecrew/taxcalc-web:0.0.0-local-unpublished
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: taxcalc-web-config
            - secretRef:
                name: taxcalc-web-agent-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
